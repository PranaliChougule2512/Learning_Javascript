<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f5f5;
        }
        .contact-box{
            max-width:900px;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        .btn-primary{
            width:100%;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center contact-box">
        <div class="col-md-6">
        

        <form id="contactForm" onsubmit="return validate()">
         <h1 class="text-center mb-4">Contact Us</h1>
            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Your name">
                <span class="text-danger" id="nameError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Your email">
                <span class="text-danger" id="emailError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number:</label>
                <input type="tel" class="form-control" id="mobile" name="mobile" placeholder="Your mobile number">
                <span class="text-danger" id="mobileError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password">
                <span class="text-danger" id="passwordError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password:</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"  placeholder="Confirm password">
                <span class="text-danger" id="confirmPasswordError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Message:</label>
                <textarea class="form-control" rows="5" id="message" name="message" placeholder="Your message"></textarea>
                <span class="text-danger" id="messageError"></span>
            </div>

            <div class="mb-3">
                <label class="form-label ">Gender:</label>

                    <input type="radio" id="male" name="gender" value="male">
                    <label class="form-label">Male</label>
                
                    <input type="radio" id="female" name="gender" value="female">
                    <label class="form-label">Female</label>
                
                    <input type="radio" id="other" name="gender" value="other">
                    <label class="form-label">Other</label>
                    
              <span class="text-danger" id="genderError"></span>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" id="agree" type="checkbox">
                <label class="form-check-label">
                    I agree to the terms & conditions
                </label>
                <span id="agreeError"></span>
            </div>

            <button type="submit" class="btn btn-primary">
                Submit
            </button>

        </form>
    </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function validate(){
        //get form values 
        const name=document.getElementById("name").value.trim();
        const email=document.getElementById("email").value.trim();
        const mobile=document.getElementById("mobile").value.trim();
        const password=document.getElementById("password").value.trim();
        const confirmPassword=document.getElementById("confirmPassword").value.trim();
        const message=document.getElementById("message").value.trim();
        const agree=document.getElementById("agree").checked;
        const gender=document.querySelector('input[name="gender"]:checked');

        //error spans
        const nameError=document.getElementById("nameError");
        const emailError=document.getElementById("emailError");
        const mobileError=document.getElementById("mobileError");
        const passwordError=document.getElementById("passwordError");
        const confirmPasswordError=document.getElementById("confirmPasswordError");
        const messageError=document.getElementById("messageError");
        const agreeError=document.getElementById("agreeError");
        const genderError=document.getElementById('genderError');

        //clear previous error msg
        nameError.textContent="";
        emailError.textContent="";
        mobileError.textContent="";
        passwordError.textContent="";
        confirmPasswordError.textContent="";
        messageError.textContent="";
        agreeError.textContent="";
        genderError.textContent="";
        
        let isValid=true;

        //validate fields
        if(name === ""){
            nameError.textContent="Please enter your name.";
            isValid=false;
        }else if(name.length<=3){
            nameError.textContent="Please enter atleast 2 characters";
            isValid=false;
        }
        //email
         if(email === ""){
            emailError.textContent="Please enter your email.";
            isValid=false;
        }else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
            emailError.textContent="Please enter valid email address";
            isValid=false;
        }
         //mobile
         if(mobile === ""){
            mobileError.textContent="Please enter your mobile number.";
            isValid=false;
        }else if(!/^(?:\+91|0)?[6-9]\d{9}$/.test(mobile)){
            mobileError.textContent="Please enter valid  10-digit mobile number";
            isValid=false;
        }
        //password
        const passwordPattern=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
         if(password === ""){
            passwordError.textContent="Please enter a password.";
            isValid=false;
        }else if(!passwordPattern.test(password)){
            passwordError.textContent="Password must be at least 8 character,including numbers and special characters";
            isValid=false;
        }
        //confirm password
        if(confirmPassword === ""){
            confirmPasswordError.textContent="Please confirm your password.";
            isValid=false;
        }else if(confirmPassword !== password){
            confirmPasswordError.textContent="Password do not match";
            isValid=false;
        }
        //msg
        if(message === ""){
            messageError.textContent="Please enter a messsage.";
            isValid=false;
        }
         if(!gender){
            genderError.textContent="Please select your gender.";
            isValid=false;
        }
         if(!agree){
            agreeError.textContent="You must agree terms and conditions.";
            isValid=false;
         }

         if(isValid){
            alert("Form submitted successfully")
         }
         return isValid;
        }
</script>

</body>
</html>
