<body>
<!-- syntax :
function functionName(){
    statement;
    statement;
}  functionName();
  -->
    <script>
        function hello(){
            document.write("Hello Everyone welcome to Pune <br>");
        }
        hello();
        hello();
        hello();
        hello();
        hello();
    </script>
    <!-- parameterised function syntax
    function functionName(){
    statement;
    statement;
    }
    functionName(argument1,argument2); -->
    <script>
        function sum(a,b,c){
            document.write(a+b+c + "<br>");
        }
        sum(20,5,4);
        sum(10,5,3);
        sum(5,55,6);
    </script>
</body>
