<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var per = prompt("Enter your percentage");
        per = parseInt(per);

        if(per>=80 && per<100){
            document.write("Your in Distinction");
        }
        else if(per>=60 && per<80){
            document.write("Your in First Class");
        }
        else if(per>=35 && per<60){
            document.write("Your in Second Class");
        }
        else if(per>=0 && per<35){
            document.write("Your in Fail");
        }
        else{
            document.write("Invalid input")
        }
    </script>
</body>
</html>
